schema_version: 1

context:
  name: igwn-cmake-macros
  version: "1.8.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://software.igwn.org/sources/source/${{ name }}-${{ version }}.tar.gz
  sha256: 80014e31841f5ea56b1e9dd2604d486db232a9a07cd72f7c2a3c6491c91b3742

build:
  number: 0

requirements:
  build:
    - cmake
    - pkg-config
    - if: win
      then: ninja
      else: make
  run_constraints:
    - igwn-cmake <0a0

tests:
  - package_contents:
      files:
        - if: win
          then: Library/share/igwn-cmake/cmake/Modules/IGWNCMakeConfig.cmake
          else: share/igwn-cmake/cmake/Modules/IGWNCMakeConfig.cmake
  - requirements:
      run:
        - pkg-config
    script:
      - pkg-config --print-errors --exact-version "${{ version }}" igwncmake

about:
  summary: This is a collection of CMake functions used as a replacement for autoconf macros
  description: |
    This is a collection of macros and scripts that were developed to aid
    in the process of converting Autotools based projects into CMake.
  homepage: https://git.ligo.org/ldastools/igwn-cmake
  repository: https://git.ligo.org/ldastools/igwn-cmake.git
  license: GPL-2.0-or-later
  license_file: COPYING

extra:
  recipe-maintainers:
    - duncanmmacleod
    - emaros
